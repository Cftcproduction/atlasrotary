<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>{{SEO_TITLE}}</title>
  <meta name="description" content="{{SEO_DESCRIPTION}}" />
  <meta name="keywords" content="{{SEO_KEYWORDS}}" />
  <link rel="canonical" href="{{CANONICAL_URL}}" />
  <meta property="og:title" content="{{SEO_TITLE}}" />
  <meta property="og:description" content="{{SEO_DESCRIPTION}}" />
  <meta property="og:image" content="{{OG_IMAGE}}" />
  <meta property="og:url" content="{{CANONICAL_URL}}" />
  <meta property="og:type" content="article" />
  <link rel="icon" href="/images/favicon.png" />
  <link rel="stylesheet" href="/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/animate.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css">

  <link rel="stylesheet" href="/css/magnific-popup.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>

<body>
  {{HEADER}}
  <section class="breadcrumb-area" style="background-image: url(/images/events.jpg)">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb-content">
            <ul class="breadcrumb__list">
              <li class="active__list-item"><a href="/">Anasayfa</a></li>
              <li><a href="/events/">ETKİNLİKLER</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="event-detail-area">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="blog-content">
            <div class="blog-item">
              <div class="blog-img">
                <div class="event-gallery fancybox-gallery">
                  {{GALLERY_IMAGES}}
                </div>
                <span class="blog_tag">
                  <span class="date__num-text">{{DATE_DAY}}</span>
                  <span class="date__mon-text">{{DATE_MONTH}}</span>
                </span>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="event-detail-content">
            {{EVENT_CONTENT}}
          </div>
        </div>

        <div class="col-lg-4">
          <div class="event-detail-sidebar">
            <div class="event-detail-item event-detail-item1">
              <h3 class="event__title">{{SIDEBAR_TITLE}}</h3>
              <ul class="event__list">
                {{SIDEBAR_ITEMS}}
              </ul>
            </div>
            {{MAP_BLOCK}}
          </div>
        </div>
      </div>
    </div>
  </section>

  {{FOOTER}}
  {{SCRIPTS}}
</body>

</html>
