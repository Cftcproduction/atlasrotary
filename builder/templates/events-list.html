<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>{{SEO_TITLE}}</title>
  <meta name="description" content="{{SEO_DESCRIPTION}}" />
  <link rel="canonical" href="{{CANONICAL_URL}}" />
  <link rel="icon" href="/images/favicon.png" />
  <link rel="stylesheet" href="/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/animate.min.css" />
  <link rel="stylesheet" href="/css/owl.carousel.min.css" />
  <link rel="stylesheet" href="/css/owl.theme.default.min.css" />
  <link rel="stylesheet" href="/css/magnific-popup.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>

<body>
  {{HEADER}}

  <section class="breadcrumb-area" style="background-image: url(/images/events.jpg)">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb-content">
            <ul class="breadcrumb__list">
              <li class="active__list-item"><a href="/">Anasayfa</a></li>
              <li>ETKİNLİKLER</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="causes-area upcoming-event-area upcoming-event-area2">
    <div class="container">
      <div class="event-search-desktop" role="search" aria-label="Etkinlik arama">
        <input type="text" id="eventSearchInputDesktop" class="event-search-input" placeholder="Etkinlik ara..."
          autocomplete="off" />
        <button type="button" id="eventSearchButtonDesktop" class="event-search-button">Ara</button>
        <button type="button" id="eventSearchClearDesktop" class="event-search-clear">Temizle</button>
      </div>

      <div class="mobile-search-bar" role="search" aria-label="Etkinlik arama">
        <input type="text" id="eventSearchInputMobile" class="mobile-search-input" placeholder="Etkinlik ara..."
          autocomplete="off" />
        <button type="button" id="eventSearchButtonMobile" class="mobile-search-button">Ara</button>
      </div>

      <p id="eventSearchResult" class="event-search-result" aria-live="polite"></p>

      <div class="row blog-content-wrap" id="eventList">
        {{EVENT_CARDS}}
      </div>
    </div>
  </section>

  <div id="back-to-top" class="back-btn-shown" aria-label="Yukarı">
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 5l7 7-1.4 1.4L13 8.8V20h-2V8.8L6.4 13.4 5 12z"></path>
    </svg>
  </div>
  {{FOOTER}}
  {{SCRIPTS}}
  <script>
    function normalizeTurkishText(text) {
      return String(text || "")
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ı/g, "i")
        .replace(/ğ/g, "g")
        .replace(/ü/g, "u")
        .replace(/ş/g, "s")
        .replace(/ö/g, "o")
        .replace(/ç/g, "c")
        .trim();
    }

    document.addEventListener("DOMContentLoaded", function () {
      const desktopInput = document.getElementById("eventSearchInputDesktop");
      const mobileInput = document.getElementById("eventSearchInputMobile");
      const desktopButton = document.getElementById("eventSearchButtonDesktop");
      const mobileButton = document.getElementById("eventSearchButtonMobile");
      const clearButton = document.getElementById("eventSearchClearDesktop");
      const resultText = document.getElementById("eventSearchResult");
      const eventCards = document.querySelectorAll("#eventList > .col-lg-4");

      function isMobileView() {
        return window.matchMedia("(max-width: 767px)").matches;
      }

      function getSearchValue() {
        return isMobileView() ? mobileInput.value : desktopInput.value;
      }

      function syncInputs(value) {
        desktopInput.value = value;
        mobileInput.value = value;
      }

      function searchEvents() {
        const rawValue = getSearchValue();
        const query = normalizeTurkishText(rawValue);
        let visibleCount = 0;

        syncInputs(rawValue);

        eventCards.forEach(function (card) {
          const cardText = normalizeTurkishText(card.textContent);
          const isMatch = !query || cardText.includes(query);

          card.style.display = isMatch ? "" : "none";

          if (isMatch) {
            visibleCount++;
          }
        });

        if (!query) {
          resultText.textContent = "";
        } else if (visibleCount > 0) {
          resultText.textContent = visibleCount + " etkinlik bulundu.";
        } else {
          resultText.textContent = "Aramanıza uygun etkinlik bulunamadı.";
        }
      }

      function clearSearch() {
        syncInputs("");
        eventCards.forEach(function (card) {
          card.style.display = "";
        });
        resultText.textContent = "";
      }

      desktopButton.addEventListener("click", searchEvents);
      mobileButton.addEventListener("click", searchEvents);
      clearButton.addEventListener("click", clearSearch);

      [desktopInput, mobileInput].forEach(function (input) {
        input.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            searchEvents();
          }
        });
      });
    });
  </script>
</body>

</html>
